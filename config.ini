# Конфиг проекта: пути к данным, split train/val, гиперпараметры TF-IDF + Logistic Regression,
# а также пути к артефактам (модель, метрики, submission).
# После изменения параметров пересобери пайплайн: python -m dvc repro

[DATA]
# Исходные CSV из Kaggle: train с метками, test без меток.
train_csv = data\train.csv
test_csv = data\test.csv

[SPLIT_DATA]
# Результат preprocess: выборки для обучения и валидации.
train_split_csv = data\train_split.csv
val_split_csv = data\val_split.csv
# Доля валидации и seed для воспроизводимости split.
test_size = 0.2
random_state = 42

[TFIDF]
# Диапазон n-грамм: (ngram_min, ngram_max). Для твитов обычно хорошо (1, 2).
ngram_min = 1
ngram_max = 2
# Ограничение словаря по частоте признаков (уменьшает память и ускоряет обучение).
max_features = 200000
# Минимальная частота документа: целое число или доля (см. sklearn TfidfVectorizer.min_df).
min_df = 1
# Максимальная частота документа: доля в (0, 1] или целое число документов (см. sklearn TfidfVectorizer.max_df).
max_df = 1.0

[LOG_REG]
# Логистическая регрессия поверх TF-IDF признаков.
# c — обратная сила регуляризации (больше C -> меньше регуляризация).
c = 1.0
max_iter = 2000
# solver: часто liblinear хорош для небольших разреженных задач; можно пробовать lbfgs/saga при необходимости.
solver = liblinear
# Куда сохраняются артефакты после train/predict.
model_path = experiments\tfidf_log_reg.pkl
metrics_path = experiments\metrics.json
submission_path = experiments\submission.csv
